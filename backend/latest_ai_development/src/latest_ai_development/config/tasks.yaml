intake_task:
  description: >
    A user has come to you with a PC problem.
    Their initial message is: "{user_input}"
    You also have access to their PC diagnostic data: "{pc_info}"
    Use this data to ask smarter, more targeted questions.
    Ask minimum 3 maximum 6 questions ONE AT A TIME.
    Stop early if you have enough information.
  expected_output: >
    A clean structured summary containing:
    - problem: main problem described
    - symptoms: list of symptoms reported
    - started: when the problem began
    - frequency: constant or intermittent
    - recent_changes: any recent updates or installs
    - os: operating system
    - pc_age: how old the PC is
    - error_messages: any errors seen
    - pc_data_flags: concerning findings from pc_info
  agent: intake_agent

classifier_task:
  description: >
    Using the intake summary and PC diagnostic data:
    "{pc_info}"
    Classify the problem as Hardware, Software, or Network.
    Base your classification on both user symptoms and pc_info data.
  expected_output: >
    A classification report containing:
    - category: Hardware | Software | Network
    - confidence: percentage 0-100
    - reasoning: why you classified it this way
    - key_evidence: top 3 pieces of evidence
    - focus_areas: what diagnostician should investigate
  agent: classifier_agent

diagnostic_task:
  description: >
    Using the classification report and PC diagnostic data:
    "{pc_info}"
    Perform a deep diagnosis to find the root cause.
    Cross reference user symptoms with pc_info data.
    Look for patterns that explain the problem.
  expected_output: >
    A diagnosis report containing:
    - root_cause: most likely cause of the problem
    - contributing_factors: other things making it worse
    - evidence: data points that support the diagnosis
    - severity: Low | Medium | High | Critical
    - confidence: percentage 0-100
  agent: diagnostic_agent

solution_task:
  description: >
    Using the diagnosis report and PC diagnostic data:
    "{pc_info}"
    Provide clear step by step fix instructions ordered 
    from easiest to most complex.
    Tailor solutions to the user's OS and PC specs from pc_info.
  expected_output: >
    A solution report containing:
    - summary: one line description of the problem
    - steps: numbered list of fix steps, each with:
        - step: what to do
        - why: why this helps
        - fallback: what to do if it doesnt work
    - estimated_time: how long the fix should take
    - prevention: how to avoid this in future
    - escalation: when to seek professional help
  agent: solution_agent
